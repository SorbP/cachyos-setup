# Okabe-Ito Deuteranopia Theme for Kitty
# Optimized for deuteranopia: blue-yellow axis primary, red-green avoided
# Place in ~/.config/kitty/themes/ and add to kitty.conf:
#   include ~/.config/kitty/themes/okabe-ito-deutan.conf

background            #1C1C1C
foreground            #F2F2F2
cursor                #F0E442
cursor_text_color     #1C1C1C
selection_background  #0072B2
selection_foreground  #F2F2F2
url_color             #56B4E9

# ANSI colors (0-7 normal, 8-15 bright)
color0  #1C1C1C   # Black
color1  #D55E00   # "Red"     -> Vermillion (dark orange)
color2  #009E73   # "Green"   -> Bluish Green (distinguishable by luminance)
color3  #E69F00   # "Yellow"  -> Orange (bright amber)
color4  #0072B2   # Blue
color5  #CC79A7   # "Magenta" -> Reddish Purple
color6  #56B4E9   # "Cyan"    -> Sky Blue
color7  #F2F2F2   # White

color8  #555555   # Bright Black
color9  #E69F00   # Bright "Red"   -> Orange (high-vis)
color10 #56B4E9   # Bright "Green" -> Sky Blue
color11 #F0E442   # Bright Yellow
color12 #56B4E9   # Bright Blue
color13 #CC79A7   # Bright "Magenta"
color14 #56B4E9   # Bright Cyan
color15 #FFFFFF   # Bright White
